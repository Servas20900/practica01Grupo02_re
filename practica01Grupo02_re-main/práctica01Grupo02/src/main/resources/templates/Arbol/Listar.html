0 <!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{../../layout/plantilla :: head}">
        <title>Finca2</title>
    </head>

    <body class="bg-dark text-white">

        <header th:replace="~{../../layout/plantilla :: header}"/>
            
            <div th:fragment="content">
                <h1 class="text-white">Lista de Árboles</h1>
                <table class="table table-dark">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre Común</th>
                            <th>Tipo de Flor</th>
                            <th>Dureza de Madera</th>
                            <th>Altura Promedio</th>
                            <th>Activo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="arbol : ${arboles}">
                            <td th:text="${arbol.id_arbol}"></td>
                            <td th:text="${arbol.nombre_comun}"></td>
                            <td th:text="${arbol.tipo_flor}"></td>
                            <td th:text="${arbol.dureza_madera}"></td>
                            <td th:text="${arbol.altura_promedio}"></td>
                            <td th:text="${arbol.activo} ? 'Sí' : 'No'"></td>
                            <td>
                                <a th:href="@{/Arbol/eliminar/{id}(id=${arbol.id_arbol})}" class="btn btn-danger">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            

        <footer th:replace="~{../../layout/plantilla :: footer}"/>         
      
    </body>
</html>
